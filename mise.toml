[tasks.prepare]
description = "Prepare"
run = "npm run prepare"

[tasks.dev]
description = "Build in watch mode"
run = "npm run dev"

[tasks.test]
description = "Run tests once"
run = "npm test"

[tasks."test:watch"]
description = "Run tests in watch mode"
run = "npm run test:watch"

[tasks.clean]
description = "Remove dist/"
run = "npm run clean"

