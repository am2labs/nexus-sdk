openapi: 3.1.0
info:
  title: Nexus Public API
  version: 1.0.0
  description: >
    Read-only API for retrieving published content from a Nexus-managed
    website. Authenticate with a site-scoped API key issued from the admin
    dashboard.
  license:
    name: UNLICENSED
    identifier: UNLICENSED

servers:
  - url: /api/v1
    description: Base path (relative to the deployment origin)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "nxs_<token>"
      description: >
        Site-scoped API key. Generate one under Admin > Website > Settings.
        Pass the full key (e.g. `nxs_abc123...`) as a Bearer token.

  schemas:
    Translation:
      type: object
      required:
        - locale
        - content
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        content:
          type: string
          description: Translated testimonial body

    Testimonial:
      type: object
      required:
        - id
        - author
        - image1
        - image2
        - translations
      properties:
        id:
          type: integer
        author:
          type: string
        image1:
          oneOf:
            - $ref: "#/components/schemas/GalleryImage"
            - type: "null"
          description: First gallery image, or null if none assigned
        image2:
          oneOf:
            - $ref: "#/components/schemas/GalleryImage"
            - type: "null"
          description: Second gallery image, or null if none assigned
        translations:
          type: array
          items:
            $ref: "#/components/schemas/Translation"

    TestimonialListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Testimonial"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    FormTranslation:
      type: object
      required:
        - locale
        - title
        - submitLabel
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        title:
          type: string
        description:
          type:
            - string
            - "null"
        submitLabel:
          type: string

    FormStepTranslation:
      type: object
      required:
        - locale
        - title
      properties:
        locale:
          type: string
        title:
          type: string
        description:
          type:
            - string
            - "null"

    FormStep:
      type: object
      required:
        - id
        - position
        - translations
      properties:
        id:
          type: integer
        position:
          type: integer
        translations:
          type: array
          items:
            $ref: "#/components/schemas/FormStepTranslation"

    FormFieldTranslation:
      type: object
      required:
        - locale
        - label
      properties:
        locale:
          type: string
        label:
          type: string
        placeholder:
          type:
            - string
            - "null"
        helperText:
          type:
            - string
            - "null"
        optionLabels:
          description: "Map of option value to translated label, or null"
          type:
            - object
            - "null"

    FormField:
      type: object
      required:
        - id
        - position
        - name
        - type
        - required
        - config
        - conditions
        - translations
      properties:
        id:
          type: integer
        stepId:
          type:
            - integer
            - "null"
        parentId:
          type:
            - integer
            - "null"
        position:
          type: integer
        name:
          type: string
        type:
          type: string
          description: "Field type: text, email, tel, url, number, textarea, select, radio, checkbox, checkbox_group, group"
        required:
          type: boolean
        config:
          type: object
          description: "Field-type-specific configuration (options, min/max, etc.)"
        conditions:
          type: object
          description: "Conditional visibility rules"
        translations:
          type: array
          items:
            $ref: "#/components/schemas/FormFieldTranslation"

    Form:
      type: object
      required:
        - id
        - slug
        - submitAction
        - spamProtection
        - translations
        - steps
        - fields
      properties:
        id:
          type: integer
        slug:
          type: string
        submitAction:
          type: object
          description: "Submit action configuration"
        spamProtection:
          type: object
          description: "Spam protection configuration"
        translations:
          type: array
          items:
            $ref: "#/components/schemas/FormTranslation"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FormStep"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"

    FormListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Form"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    ContentBlockTranslation:
      type: object
      required:
        - locale
        - content
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        content:
          type: string
          description: Translated block content

    ContentBlock:
      type: object
      required:
        - id
        - type
        - position
        - translations
      properties:
        id:
          type: integer
        type:
          type: string
          description: Block type (e.g. text, image, video)
        position:
          type: integer
        meta:
          type:
            - string
            - "null"
          description: Optional JSON metadata for the block
        translations:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlockTranslation"

    Page:
      type: object
      required:
        - id
        - slug
        - title
        - blocks
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"

    PageListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Page"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    TeamMemberTranslation:
      type: object
      required:
        - locale
        - title
        - shortBiography
        - longBiography
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        title:
          type: string
          description: Translated job title
        shortBiography:
          type: string
          description: Translated short biography
        longBiography:
          type: string
          description: Translated long biography

    TeamMember:
      type: object
      required:
        - id
        - firstName
        - lastName
        - position
        - groupId
        - image
        - translations
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: integer
        groupId:
          type:
            - integer
            - "null"
        image:
          oneOf:
            - $ref: "#/components/schemas/GalleryImage"
            - type: "null"
          description: Profile image, or null if none assigned
        translations:
          type: array
          items:
            $ref: "#/components/schemas/TeamMemberTranslation"

    TeamMemberListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    JobTranslation:
      type: object
      required:
        - locale
        - title
        - description
        - requirements
        - niceToHaves
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        title:
          type: string
        description:
          type: string
        requirements:
          type: string
        niceToHaves:
          type: string

    JobLocation:
      type: object
      required:
        - id
        - name
        - city
        - state
        - country
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string

    Job:
      type: object
      required:
        - id
        - slug
        - workArrangement
        - employmentType
        - department
        - salaryCurrency
        - translations
      properties:
        id:
          type: integer
        slug:
          type: string
        workArrangement:
          type: string
          description: "Work arrangement: on_site, remote, hybrid"
        employmentType:
          type: string
          description: "Employment type: full_time, part_time, contract, internship"
        department:
          type: string
        salaryMin:
          type:
            - integer
            - "null"
        salaryMax:
          type:
            - integer
            - "null"
        salaryCurrency:
          type: string
        location:
          oneOf:
            - $ref: "#/components/schemas/JobLocation"
            - type: "null"
        translations:
          type: array
          items:
            $ref: "#/components/schemas/JobTranslation"

    JobListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    NavigationItemTranslation:
      type: object
      required:
        - locale
        - label
      properties:
        locale:
          type: string
          example: en
        label:
          type: string
          example: Home

    NavigationItem:
      type: object
      required:
        - id
        - parentId
        - position
        - url
        - openInNewTab
        - translations
      properties:
        id:
          type: integer
        parentId:
          type: integer
          nullable: true
        position:
          type: integer
        url:
          type: string
        openInNewTab:
          type: boolean
        translations:
          type: array
          items:
            $ref: "#/components/schemas/NavigationItemTranslation"

    Navigation:
      type: object
      required:
        - id
        - handle
        - position
        - items
      properties:
        id:
          type: integer
        handle:
          type: string
          example: main-menu
        position:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/NavigationItem"

    NavigationListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Navigation"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    BrandingGlobalsTranslation:
      type: object
      required:
        - locale
        - tagline
        - footerCopyright
        - footerAddress
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        tagline:
          type: string
        footerCopyright:
          type: string
        footerAddress:
          type: string

    BrandingGlobals:
      type: object
      required:
        - phone
        - email
        - translations
      properties:
        phone:
          type: string
        email:
          type: string
        translations:
          type: array
          items:
            $ref: "#/components/schemas/BrandingGlobalsTranslation"

    BrandingLogoTranslation:
      type: object
      required:
        - locale
        - altText
      properties:
        locale:
          type: string
        altText:
          type: string

    BrandingLogo:
      type: object
      required:
        - id
        - role
        - image
        - position
        - translations
      properties:
        id:
          type: integer
        role:
          type: string
        image:
          oneOf:
            - $ref: "#/components/schemas/GalleryImage"
            - type: "null"
          description: Logo image, or null if none assigned
        position:
          type: integer
        translations:
          type: array
          items:
            $ref: "#/components/schemas/BrandingLogoTranslation"

    BrandingCtaTranslation:
      type: object
      required:
        - locale
        - label
      properties:
        locale:
          type: string
        label:
          type: string

    BrandingCta:
      type: object
      required:
        - id
        - zone
        - url
        - openInNewTab
        - position
        - translations
      properties:
        id:
          type: integer
        zone:
          type: string
        url:
          type: string
        openInNewTab:
          type: boolean
        position:
          type: integer
        translations:
          type: array
          items:
            $ref: "#/components/schemas/BrandingCtaTranslation"

    BrandingSocialLink:
      type: object
      required:
        - id
        - platform
        - url
        - position
      properties:
        id:
          type: integer
        platform:
          type: string
        url:
          type: string
        position:
          type: integer

    BrandingResponse:
      type: object
      required:
        - globals
        - logos
        - ctas
        - socialLinks
      properties:
        globals:
          oneOf:
            - $ref: "#/components/schemas/BrandingGlobals"
            - type: "null"
          description: Site-wide globals, or null if none published
        logos:
          type: array
          items:
            $ref: "#/components/schemas/BrandingLogo"
        ctas:
          type: array
          items:
            $ref: "#/components/schemas/BrandingCta"
        socialLinks:
          type: array
          items:
            $ref: "#/components/schemas/BrandingSocialLink"

    Locale:
      type: object
      required:
        - locale
        - name
        - isDefault
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        name:
          type: string
          description: Display name
          examples:
            - English
            - Spanish
        isDefault:
          type: boolean
          description: Whether this is the site's default locale

    LocalesResponse:
      type: object
      required:
        - locales
        - default
      properties:
        locales:
          type: array
          items:
            $ref: "#/components/schemas/Locale"
        default:
          type:
            - string
            - "null"
          description: >
            The locale code of the default locale, or null if no locales are
            configured.

    BlogAuthor:
      type: object
      required:
        - id
        - firstName
        - lastName
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string

    BlogCoverImage:
      type: object
      required:
        - id
        - slug
        - url
        - altText
      properties:
        id:
          type: integer
        slug:
          type: string
        url:
          type: string
          format: uri
          description: Fully qualified public URL to the cover image
        altText:
          type: string

    GalleryImage:
      type: object
      required:
        - id
        - slug
        - url
        - altText
      properties:
        id:
          type: integer
        slug:
          type: string
        url:
          type: string
          format: uri
          description: Fully qualified public URL to the image file
        altText:
          type: string

    BlogPostTranslation:
      type: object
      required:
        - locale
        - excerpt
        - seoTitle
      properties:
        locale:
          type: string
          description: ISO 639-1 language code
          examples:
            - en
            - es
        excerpt:
          type: string
        seoTitle:
          type: string

    BlogPost:
      type: object
      required:
        - id
        - slug
        - title
        - publishedAt
        - tags
        - translations
        - blocks
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        publishedAt:
          type:
            - string
            - "null"
          format: date-time
        author:
          oneOf:
            - $ref: "#/components/schemas/BlogAuthor"
            - type: "null"
        coverImage:
          oneOf:
            - $ref: "#/components/schemas/BlogCoverImage"
            - type: "null"
        tags:
          type: array
          items:
            type: string
        translations:
          type: array
          items:
            $ref: "#/components/schemas/BlogPostTranslation"
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/ContentBlock"

    BlogListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BlogPost"
        nextCursor:
          type:
            - string
            - "null"
          description: >
            Opaque cursor for the next page. Pass as the `cursor` query
            parameter to fetch the next batch. Null when there are no more
            results.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Missing or invalid API key

    Forbidden:
      description: API key does not grant access to the requested site
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: API key siteSlug does not match path siteSlug

    NotFound:
      description: Resource not found or not published
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Resource not found

    NotFoundForm:
      description: Form not found or not published
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Form not found

    RateLimited:
      description: Rate limit exceeded (documented, not yet implemented)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Rate limit exceeded

  parameters:
    siteSlug:
      name: siteSlug
      in: path
      required: true
      schema:
        type: string
      description: Site slug identifier

    formSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Form slug identifier

    pageSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Page slug identifier

    jobSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Job slug identifier

    navigationHandle:
      name: handle
      in: path
      required: true
      schema:
        type: string
      description: Navigation handle identifier

    blogPostSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Blog post slug identifier

paths:
  /websites/{siteSlug}/testimonials:
    get:
      operationId: listTestimonials
      summary: List published testimonials
      description: >
        Returns a paginated list of published testimonials for the given site.
        Only testimonials with `status = 'published'` and no `deletedAt` value
        are included. All translations are embedded in every response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of testimonials to return per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor returned by a previous request
      responses:
        "200":
          description: Paginated list of published testimonials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestimonialListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /websites/{siteSlug}/forms:
    get:
      operationId: listForms
      summary: List published forms
      description: >
        Returns a paginated list of published forms for the given site.
        Only forms with `status = 'published'`, a `publishedAt` value, and no
        `deletedAt` value are included. All translations, steps, and fields
        are embedded in every response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of forms to return per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor returned by a previous request
      responses:
        "200":
          description: Paginated list of published forms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /websites/{siteSlug}/forms/{slug}:
    get:
      operationId: getForm
      summary: Get a single published form
      description: >
        Returns a single form by slug, provided it belongs to the given site,
        has `status = 'published'`, a `publishedAt` value, and no `deletedAt`
        value. All translations, steps, and fields are embedded in the response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - $ref: "#/components/parameters/formSlug"
      responses:
        "200":
          description: The requested form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFoundForm"

  /websites/{siteSlug}/pages:
    get:
      operationId: listPages
      summary: List published content pages
      description: >
        Returns a paginated list of published content pages for the given site.
        Only pages with `status = 'published'`, a `publishedAt` value, and no
        `deletedAt` value are included. All content blocks and their
        translations are embedded in every response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of pages to return per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor returned by a previous request
      responses:
        "200":
          description: Paginated list of published pages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /websites/{siteSlug}/pages/{slug}:
    get:
      operationId: getPage
      summary: Get a single published content page
      description: >
        Returns a single content page by slug, provided it belongs to the given
        site, has `status = 'published'`, a `publishedAt` value, and no
        `deletedAt` value. All content blocks and their translations are
        embedded in the response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - $ref: "#/components/parameters/pageSlug"
      responses:
        "200":
          description: The requested page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites/{siteSlug}/team-members:
    get:
      operationId: listTeamMembers
      summary: List published team members
      description: >
