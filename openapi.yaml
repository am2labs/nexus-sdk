  /websites/{siteSlug}/blog:
    get:
      operationId: listBlogPosts
      summary: List published blog posts
      description: >
        Returns a paginated list of published blog posts for the given site.
        Only posts with `status = 'published'`, a `publishedAt` value, and no
        `deletedAt` value are included. Supports tag filtering (AND logic),
        date-range filtering, and cursor-based pagination. All translations,
        blocks, author, and cover image data are embedded in every response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of posts to return per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor returned by a previous request
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: >
            Filter by tag. Repeatable for AND logic (e.g. ?tag=react&tag=typescript
            returns posts tagged with both).
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only include posts published at or after this date (ISO 8601)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only include posts published at or before this date (ISO 8601)
      responses:
        "200":
          description: Paginated list of published blog posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /websites/{siteSlug}/blog/{slug}:
    get:
      operationId: getBlogPost
      summary: Get a single published blog post
      description: >
        Returns a single blog post by slug, provided it belongs to the given
        site, has `status = 'published'`, a `publishedAt` value, and no
        `deletedAt` value. All translations, blocks, author, and cover image
        data are embedded in the response.
      parameters:
        - $ref: "#/components/parameters/siteSlug"
        - $ref: "#/components/parameters/blogPostSlug"
      responses:
        "200":
          description: The requested blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
